<!DOCTYPE html>
<html style="margin:0;padding:0;width:100%;overflow-x:hidden;background-color:#F7F5F0;">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Family OS</title>
    <!-- Noto Color Emoji for Windows touchscreen color emoji support -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800;900&family=Noto+Color+Emoji&display=swap">
    <style>
      html, body, #root {
        margin: 0 !important;
        padding: 0 !important;
        width: 100% !important;
        max-width: 100% !important;
        overflow-x: hidden !important;
        min-height: 100vh !important;
        background-color: #F7F5F0 !important;
      }
      * {
        box-sizing: border-box !important;
        -webkit-tap-highlight-color: transparent;
        font-variant-emoji: emoji;
      }
      /* Windows touchscreen: force Segoe UI Emoji for color emoji */
      body {
        font-family: 'Fredoka', 'Noto Color Emoji', 'Segoe UI Emoji', 'Apple Color Emoji', sans-serif;
      }
      ::-webkit-scrollbar { width: 3px; height: 3px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 99px; }
    </style>
  </head>
  <body style="margin:0;padding:0;width:100%;touch-action:pan-y;background-color:#F7F5F0;">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
